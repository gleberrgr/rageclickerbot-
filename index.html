<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rage Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-bg: #0f0f13; --card-bg: #1e1e24; --accent: #ffcc00; --text: #ffffff; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--main-bg); color: var(--text); 
            margin: 0; padding: 0; overflow: hidden; user-select: none;
            -webkit-tap-highlight-color: transparent; /* Убирает синий квадрат */
        }

        /* Шапка с балансом */
        .header { 
            display: flex; justify-content: space-around; background: var(--card-bg); 
            padding: 15px; border-bottom: 2px solid #333; font-weight: bold; font-size: 14px;
        }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-item span { color: var(--accent); font-size: 18px; }

        .tab-content { display: none; height: calc(100vh - 140px); overflow-y: auto; padding: 20px; }
        .active { display: block; }

        /* Кликер */
        .clicker-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        #click-circle { 
            width: 220px; height: 220px; 
            background: radial-gradient(circle, #ffcc00 0%, #ff8800 100%); 
            border-radius: 50%; border: 8px solid #333;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 60px; transition: transform 0.05s; cursor: pointer;
        }
        #click-circle:active { transform: scale(0.92); }

        /* Анимация +1 */
        .floating-text {
            position: absolute; color: var(--accent); font-weight: bold;
            font-size: 24px; pointer-events: none; animation: floatUp 0.6s ease-out forwards;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        /* Кейсы */
        .case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .case-card { 
            background: var(--card-bg); padding: 15px; border-radius: 15px; 
            border: 1px solid #444; text-align: center; position: relative;
        }
        .case-img { font-size: 40px; margin-bottom: 10px; display: block; }
        .case-card b { font-size: 16px; display: block; margin-bottom: 5px; }
        .case-card button { 
            background: var(--accent); border: none; padding: 8px 15px; 
            border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px;
        }

        /* ТОП Лидеров */
        .top-list { background: var(--card-bg); border-radius: 15px; padding: 10px; }
        .top-item { 
            display: flex; justify-content: space-between; padding: 10px;
            border-bottom: 1px solid #333;
        }
        .top-item:last-child { border: none; }
        .rank { color: var(--accent); font-weight: bold; margin-right: 10px; }

        /* Навигация */
        .navbar { 
            position: fixed; bottom: 0; width: 100%; background: var(--card-bg); 
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid #333;
        }
        .nav-btn { color: #888; font-size: 12px; font-weight: bold; cursor: pointer; text-align: center; }
        .nav-btn.active-nav { color: var(--accent); }
    </style>
</head>
<body>

<div class="header">
    <div class="stat-item">💰 МОНЕТЫ <span id="coins">0</span></div>
    <div class="stat-item">💎 АЛМАЗЫ <span id="diamonds">0</span></div>
    <div class="stat-item">🌀 ПЛАЗМА <span id="plasma">0</span></div>
</div>

<div id="tab-clicker" class="tab-content active">
    <div class="clicker-container">
        <h2 style="margin-top: 0;">Уровень <span id="lvl">1</span></h2>
        <div id="click-circle">🔥</div>
        <p style="color: #888;">Сила клика: <span id="power">1</span></p>
    </div>
</div>

<div id="tab-cases" class="tab-content">
    <h2 style="text-align: center;">Магазин Кейсов</h2>
    <div class="case-grid">
        <div class="case-card">
            <span class="case-img">📦</span>
            <b>Бронзовый</b>
            <small>Цена: 100 💰</small>
            <button onclick="buyCase(100, 'Бронзовый')">ОТКРЫТЬ</button>
        </div>
        <div class="case-card">
            <span class="case-img">🎁</span>
            <b>Серебряный</b>
            <small>Цена: 500 💰</small>
            <button onclick="buyCase(500, 'Серебряный')">ОТКРЫТЬ</button>
        </div>
        <div class="case-card">
            <span class="case-img">💎</span>
            <b>Золотой</b>
            <small>Цена: 2500 💰</small>
            <button onclick="buyCase(2500, 'Золотой')">ОТКРЫТЬ</button>
        </div>
        <div class="case-card">
            <span class="case-img">👑</span>
            <b>Королевский</b>
            <small>Цена: 10000 💰</small>
            <button onclick="buyCase(10000, 'Королевский')">ОТКРЫТЬ</button>
        </div>
    </div>
</div>

<div id="tab-top" class="tab-content">
    <h2 style="text-align: center;">🏆 ТОП ИГРОКОВ</h2>
    <div class="top-list">
        <div class="top-item"><span><span class="rank">#1</span> Gleb (Ты)</span> <span>70 💰</span></div>
        <div class="top-item"><span><span class="rank">#2</span> Alex Bot</span> <span>50 💰</span></div>
        <div class="top-item"><span><span class="rank">#3</span> CryptoKing</span> <span>25 💰</span></div>
    </div>
    <button onclick="saveToBot()" style="width:100%; margin-top:20px; padding:15px; border-radius:10px; background:#4caf50; border:none; color:white; font-weight:bold;">💾 СОХРАНИТЬ ПРОГРЕСС</button>
</div>

<div class="navbar">
    <div class="nav-btn active-nav" onclick="openTab('clicker', this)">🔘<br>КЛИК</div>
    <div class="nav-btn" onclick="openTab('cases', this)">🎁<br>КЕЙСЫ</div>
    <div class="nav-btn" onclick="openTab('top', this)">🏆<br>ТОП</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let stats = { coins: 0, diamonds: 0, plasma: 0, power: 1, lvl: 1 };

    function clickBtn(e) {
        stats.coins += stats.power;
        updateUI();
        showPlusOne(e);
        tg.HapticFeedback.impactOccurred('light'); // Вибрация при клике
    }

    document.getElementById('click-circle').addEventListener('touchstart', function(e) {
        clickBtn(e.touches[0]);
    });

    function showPlusOne(e) {
        const floating = document.createElement('div');
        floating.className = 'floating-text';
        floating.innerText = '+' + stats.power;
        floating.style.left = e.clientX + 'px';
        floating.style.top = e.clientY + 'px';
        document.body.appendChild(floating);
        setTimeout(() => floating.remove(), 600);
    }

    function updateUI() {
        document.getElementById('coins').innerText = stats.coins;
        document.getElementById('diamonds').innerText = stats.diamonds;
        document.getElementById('plasma').innerText = stats.plasma;
    }

    function openTab(name, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        document.getElementById('tab-' + name).classList.add('active');
        el.classList.add('active-nav');
    }

    function buyCase(price, name) {
        if(stats.coins >= price) {
            stats.coins -= price;
            updateUI();
            alert("Вы открыли " + name + "! (Призы добавятся в следующем обновлении)");
        } else {
            tg.showAlert("Недостаточно монет!");
        }
    }

    function saveToBot() {
        tg.sendData(JSON.stringify(stats));
    }
</script>
</body>
</html>
