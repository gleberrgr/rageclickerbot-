<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rage Clicker v3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0b0e; --card: #1c1c24; --accent: #00d4ff; --gold: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* Фиксированная шапка */
        .header { display: flex; justify-content: space-around; padding: 15px; background: #16161d; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .stat { text-align: center; }
        .stat b { display: block; color: var(--accent); font-size: 18px; }

        .tab-content { display: none; padding: 20px; padding-bottom: 100px; min-height: 80vh; }
        .active { display: block; }

        /* Кликер */
        .click-area { display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 50px; }
        #coin { width: 180px; height: 180px; background: radial-gradient(circle, var(--gold), #ff8800); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 70px; border: 8px solid #333; cursor: pointer; transition: 0.05s; }
        #coin:active { transform: scale(0.9); }

        /* Кейсы: Сделал сетку и красивые карточки */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .case-card { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid #333; text-align: center; }
        .case-icon { font-size: 40px; margin-bottom: 8px; display: block; }
        .case-title { font-weight: bold; font-size: 14px; display: block; margin-bottom: 4px; color: #eee; }
        .case-price { color: var(--gold); font-size: 13px; font-weight: bold; }
        .buy-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 10px; margin-top: 10px; font-weight: bold; font-size: 12px; }
        .buy-btn:active { background: #0099bb; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; background: #16161d; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { cursor: pointer; color: #666; font-size: 11px; text-align: center; transition: 0.2s; }
        .nav-item.active-nav { color: var(--accent); }
    </style>
</head>
<body>

<div class="header">
    <div class="stat">ДЕНЬГИ<b id="bal">0</b></div>
    <div class="stat">СИЛА<b id="str">1</b></div>
</div>

<div id="t-click" class="tab-content active">
    <div class="click-area">
        <div id="coin">💰</div>
        <p>Кликай на монету!</p>
    </div>
</div>

<div id="t-shop" class="tab-content">
    <h3 style="text-align:center">Магазин (25 Кейсов)</h3>
    <div class="grid" id="shop-grid"></div>
</div>

<div class="nav">
    <div class="nav-item active-nav" onclick="tab('click', this)">🖱 КЛИК</div>
    <div class="nav-item" onclick="tab('shop', this)">🎁 КЕЙСЫ</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let balance = 0;
    let power = 1;

    // Массив с названиями и иконками для 25 кейсов
    const caseData = [
        {n: "Деревянный", i: "📦", p: 50}, {n: "Железный", i: "⚙️", p: 150},
        {n: "Бронзовый", i: "🥉", p: 400}, {n: "Серебряный", i: "🥈", p: 1000},
        {n: "Золотой", i: "🥇", p: 2500}, {n: "Алмазный", i: "💎", p: 5000},
        {n: "Элитный", i: "👑", p: 10000}, {n: "Мифический", i: "🔮", p: 20000},
        {n: "Легендарный", i: "🐲", p: 40000}, {n: "Космический", i: "🌌", p: 75000},
        {n: "Плазменный", i: "🌀", p: 120000}, {n: "Радиационный", i: "☢️", p: 200000},
        {n: "Кибер", i: "🤖", p: 350000}, {n: "Теневой", i: "🌑", p: 500000},
        {n: "Солнечный", i: "☀️", p: 750000}, {n: "Звездный", i: "⭐", p: 1000000},
        {n: "Драконий", i: "🦎", p: 1500000}, {n: "Демонический", i: "👿", p: 2500000},
        {n: "Божественный", i: "😇", p: 5000000}, {n: "Магический", i: "✨", p: 8000000},
        {n: "Кровавый", i: "🩸", p: 12000000}, {n: "Ледяной", i: "❄️", p: 20000000},
        {n: "Огненный", i: "🔥", p: 35000000}, {n: "Призрачный", i: "👻", p: 60000000},
        {n: "Rage Case", i: "👺", p: 100000000}
    ];

    // Генерируем карточки
    const grid = document.getElementById('shop-grid');
    caseData.forEach((c, index) => {
        grid.innerHTML += `
            <div class="case-card">
                <span class="case-icon">${c.i}</span>
                <span class="case-title">${c.n}</span>
                <span class="case-price">${c.p} 💰</span>
                <button class="buy-btn" onclick="buyCase(${c.p}, '${c.n}')">КУПИТЬ</button>
            </div>
        `;
    });

    function tab(name, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById('t-' + name).classList.add('active');
        el.classList.add('active-nav');
    }

    document.getElementById('coin').onclick = () => {
        balance += power;
        document.getElementById('bal').innerText = balance;
        tg.HapticFeedback.impactOccurred('light');
    };

    function buyCase(price, name) {
        if (balance >= price) {
            balance -= price;
            document.getElementById('bal').innerText = balance;
            tg.showAlert("Успешно! Вы открыли " + name + "!");
        } else {
            tg.showAlert("Не хватает еще " + (price - balance) + " монет!");
        }
    }
</script>
</body>
</html>
