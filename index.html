<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rage Clicker Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0b0e; --card: #16161d; --accent: #00d4ff; --gold: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        .header { display: flex; justify-content: space-around; padding: 15px; background: var(--card); border-bottom: 2px solid #222; position: sticky; top: 0; z-index: 10; }
        .stat { text-align: center; font-size: 12px; color: #aaa; }
        .stat b { display: block; color: var(--accent); font-size: 16px; }

        .tab-content { display: none; padding: 20px; padding-bottom: 100px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .active { display: block; }

        /* Кликер */
        .click-area { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70%; }
        #coin { width: 200px; height: 200px; background: linear-gradient(45deg, var(--gold), #ffa500); border-radius: 50%; border: 10px solid #333; cursor: pointer; transition: transform 0.05s; display: flex; align-items: center; justify-content: center; font-size: 80px; box-shadow: 0 0 40px rgba(255, 204, 0, 0.2); }
        #coin:active { transform: scale(0.9); }

        /* Кейсы (25 штук) */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-card { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .item-card button { width: 100%; background: var(--accent); border: none; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; }

        /* Инвентарь и ТОП */
        .list-item { background: var(--card); padding: 12px; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }

        .nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { cursor: pointer; font-size: 10px; text-align: center; color: #666; }
        .nav-item.active-nav { color: var(--accent); }

        .plus-one { position: absolute; color: var(--gold); font-weight: bold; font-size: 24px; animation: fly 0.7s forwards; pointer-events: none; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

<div class="header">
    <div class="stat">МОНЕТЫ <b id="bal">0</b></div>
    <div class="stat">АЛМАЗЫ <b id="diam">0</b></div>
    <div class="stat">СИЛА <b id="str">1</b></div>
</div>

<div id="t-click" class="tab-content active">
    <div class="click-area">
        <div id="coin">💰</div>
    </div>
</div>

<div id="t-shop" class="tab-content">
    <div class="grid" id="case-list"></div>
</div>

<div id="t-inv" class="tab-content">
    <h3>📦 Инвентарь</h3>
    <div id="inventory-list">Пусто</div>
</div>

<div id="t-top" class="tab-content">
    <h3>🏆 Топ игроков</h3>
    <div id="top-list"></div>
    <button onclick="save()" style="width:100%; padding:15px; margin-top:20px; background:#4caf50; color:white; border:none; border-radius:10px;">💾 СОХРАНИТЬ ВСЁ</button>
</div>

<div class="nav">
    <div class="nav-item active-nav" onclick="tab('click', this)">🖱 КЛИК</div>
    <div class="nav-item" onclick="tab('shop', this)">🎁 КЕЙСЫ</div>
    <div class="nav-item" onclick="event.preventDefault(); updateInv(); tab('inv', this)">📦 ВЕЩИ</div>
    <div class="nav-item" onclick="tab('top', this)">🏆 ТОП</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let data = { coins: 0, diamonds: 0, power: 1, inv: [], top: [{n: "Gleb", c: 1500}, {n: "Bot", c: 500}] };

    // Генерация 25 кейсов
    const cases = document.getElementById('case-list');
    for(let i=1; i<=25; i++) {
        let price = i * 200;
        cases.innerHTML += `<div class="item-card"><span>📦</span><b>Кейс #${i}</b><br><small>${price} 💰</small><button onclick="buy(${price}, ${i})">КУПИТЬ</button></div>`;
    }

    function tab(name, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById('t-' + name).classList.add('active');
        el.classList.add('active-nav');
    }

    document.getElementById('coin').onclick = (e) => {
        data.coins += data.power;
        updateUI();
        let p = document.createElement('div');
        p.className = 'plus-one'; p.innerText = '+' + data.power;
        p.style.left = e.pageX + 'px'; p.style.top = e.pageY + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 700);
        tg.HapticFeedback.impactOccurred('medium');
    };

    function buy(p, id) {
        if(data.coins >= p) {
            data.coins -= p;
            let res = Math.random() > 0.5 ? "Меч" : "Щит";
            data.inv.push(res + " #" + id);
            tg.showAlert("Выпал: " + res + "!");
            updateUI();
        } else { tg.showAlert("Мало денег!"); }
    }

    function updateInv() {
        let cont = document.getElementById('inventory-list');
        cont.innerHTML = data.inv.length ? "" : "Пусто";
        data.inv.forEach(i => { cont.innerHTML += `<div class="list-item"><span>${i}</span></div>`; });
    }

    function updateUI() {
        document.getElementById('bal').innerText = data.coins;
        document.getElementById('diam').innerText = data.diamonds;
        document.getElementById('str').innerText = data.power;
    }

    function save() { tg.sendData(JSON.stringify(data)); }
    
    // Начальный ТОП
    let tl = document.getElementById('top-list');
    data.top.forEach((u, i) => { tl.innerHTML += `<div class="list-item"><b>#${i+1} ${u.n}</b><span>${u.c} 💰</span></div>`; });
</script>
</body>
</html>
